crop:
  boundary_clamp: true
  default_format: 9x16
  face_position:
    x_target: 0.5
    y_target: 0.55
  padding:
    bottom_pct: 0.45
    top_pct: 0.4
deadzone:
  enabled: true
  threshold_pct: 0.035
  vertical_threshold_pct: 0.08
detection:
  face:
    enabled: true
    min_confidence: 0.45
    model_selection: 1
    prefer_largest: true
  pose:
    body_margin_pct: 0.15
    enabled: true
    landmark_weights:
      left_shoulder: 0.3
      nose: 0.4
      right_shoulder: 0.3
    min_confidence: 0.5
  saliency:
    enabled: true
    min_area_pct: 0.02
    threshold: 0.4
fusion:
  face_weight: 0.6
  pose_weight: 0.25
  saliency_weight: 0.15
output:
  codec: h264
  crf: 18
  generate_debug: false
  nvenc_preset: p4
  preset: medium
  scale_output: true
  use_nvenc: auto
sampling:
  auto: true
  frame_rate: 6
  interpolation: cubic
scene_detection:
  enabled: true
  min_interval: 30
  threshold: 0.15
selection:
  anchor:
    fuzzy_threshold: 75
    min_confidence: 0.5
    search_window_sec: 15.0
  clip_count: 7
  max_duration: 90
  min_duration: 45
  padding: 1.0
  scoring:
    min_total_score: 50
smoothing:
  ema:
    alpha: 0.12
  kalman:
    measurement_noise: 0.1
    process_noise: 0.003
  method: kalman
speakers:
  max_faces: 3
  mode: primary
  switch_threshold: 0.3
split_screen:
  background: blur
  dynamic_layout:
    crossfade_frames: 5
    enabled: true
    face_size_threshold: 0.06
    min_segment_duration: 1.0
    mouth_centering: true
    smoothing_window: 15
    spatial_spread_threshold: 0.15
  face_padding_pct: 1.105
  merge_distance: 0.2
  merged_padding_pct: 2.5
  min_face_size_pct: 5.0e-05
  top_ratio: 0.5
